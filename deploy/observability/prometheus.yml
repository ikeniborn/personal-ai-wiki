global:
  scrape_interval: 15s

scrape_configs:
  - job_name: paw-api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    static_configs:
      - targets: ["api:8000"]

  - job_name: paw-worker
    static_configs:
      - targets: ["worker:9100"]   # WORKER_METRICS_PORT

  - job_name: traefik
    static_configs:
      - targets: ["traefik:8082"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
