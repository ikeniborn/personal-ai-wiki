{% extends "base.html" %}
{% block title %}Setup · Personal AI Wiki{% endblock %}
{% block content %}
<h1>First-run setup</h1>
<p>Create the administrator account.</p>
<form hx-post="/api/v1/setup" hx-ext="json-enc">
  <label>Admin email <input name="email" type="email" required></label>
  <label>Password <input name="password" type="password" required></label>
  <label>Base URL <input name="base_url" required></label>
  <label>API key <input name="api_key" type="password" required></label>
  <label>Chat model <input name="chat_model" required></label>
  <label>Embedding model <input name="embedding_model" required></label>
  <label>Vision model <input name="vision_model"></label>
  <label>Embedding dim <input name="embedding_dim" type="number" required></label>
  <button type="submit">Create admin</button>
</form>
{% endblock %}
